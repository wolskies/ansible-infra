---
services:
  freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: freshrss
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
    networks:
      - proxy
    ports:
      - 8085:80
    restart: unless-stopped
networks:
  proxy:
    external: true
