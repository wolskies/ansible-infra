services:
  gitlab:
    image: gitlab/gitlab-ee
    container_name: gitlab
    restart: always
    hostname: 'gitlab.wolskinet.com'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # Add any other gitlab.rb configuration here, each on its own line
        external_url 'https://gitlab.wolskinet.com'
        gitlab_rails['smtp_enable'] = true
        gitlab_rails['smtp_address'] = "smtp.gmail.com"
        gitlab_rails['smtp_port'] = 587
        gitlab_rails['smtp_user_name'] = "ed.wolski@gmail.com"
        gitlab_rails['smtp_password'] = "yolz bedd pdhb hoin"
        gitlab_rails['smtp_domain'] = "smtp.gmail.com"
        gitlab_rails['smtp_authentication'] = "login"
        gitlab_rails['smtp_enable_starttls_auto'] = true
        gitlab_rails['smtp_tls'] = false
        gitlab_rails['smtp_pool'] = false
        gitlab_rails['smtp_openssl_verify_mode'] = 'peer'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        gitlab_rails['registry_enabled'] = true
        gitlab_rails['registry_host'] = "registry.gitlab.wolskinet.com"
        gitlab_rails['registry_port'] = "5050"
        gitlab_rails['registry_path'] = "/var/opt/gitlab/gitlab-rails/shared/registry"
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['client_max_body_size'] = '1024m'
        registry_external_url 'https://registry.wolskinet.com'
        registry_nginx['listen_port'] = 5050
        registry_nginx['listen_https'] = false
        registry_nginx['enable'] = true
        letsencrypt['enable'] = false
        gitlab_rails['gitlab_default_theme'] = 2
        gitlab_rails['gitlab_default_color_mode'] = 2
        gitlab_rails['initial_root_password'] = "ArgleBargle11"
        gitlab_rails['pages_local_store_enabled'] = true
        gitlab_rails['pages_local_store_path'] = "/var/opt/gitlab/gitlab-rails/shared/pages"
        gitlab_rails['manage_backup_path'] = true
        gitlab_rails['backup_path'] = "/var/opt/gitlab/backups"
        gitlab_rails['backup_keep_time'] = 604800
        pages_nginx['enable'] = false
        pages_external_url "http://wolskinet.com"
        gitlab_pages['enable'] = true
        gitlab_pages['listen_proxy'] = "0.0.0.0:8090"

    ports:
#      - '8880:80'
#      - '8443:443'
      - '2222:22'
      - '5050:5050'
      - '8090:8090'
    volumes:
      - '/opt/gitlab/config:/etc/gitlab'
      - '/opt/gitlab/logs:/var/log/gitlab'
      - '/opt/gitlab/data:/var/opt/gitlab'
      - '/opt/gitlab/secret:/secret/gitlab/backups'
    shm_size: '256m'

networks:
  default:
    external: true
    name: proxy

